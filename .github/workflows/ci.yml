name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: [self-hosted, terminal-1]
    timeout-minutes: 30
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
          submodules: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run unit tests
        run: cargo test --release --lib

      - name: Clone and build PIE
        run: |
          rm -rf ../proxy-inference-engine
          git clone --depth 1 --recurse-submodules "https://${{ secrets.GH_PAT }}@github.com/TheProxyCompany/proxy-inference-engine.git" ../proxy-inference-engine
          cd ../proxy-inference-engine
          ./scripts/build.sh -t Release

      - name: Run full Orchard RS suite
        env:
          ORCHARD_CACHE_ROOT: /tmp/orchard-cache-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          PIE_LOCAL_BUILD="$PWD/../proxy-inference-engine/release" cargo test --test functional -- --test-threads=1
          PIE_LOCAL_BUILD="$PWD/../proxy-inference-engine/release" cargo test --test golden -- --test-threads=1
